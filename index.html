<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>YouTubeマルチプレイ 軽量化版</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <style>
    :root {
      --bg: #000;
      --fg: #fff;
      --panel: #1f2329;
      --panel-border: #3b4350;
      --input: #2a2f38;
      --accent: #3fa7ff;
      --thumb-bg: #181818;
      --thumb-border: #353535;
      --ctrl-font: 12px;
      --ctrl-pad-y: 2px;
      --ctrl-pad-x: 6px;
      --ctrl-btn-size: 24px;
      --volume-width: 88px;
      --volume-left: 42px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: sans-serif;
      overflow-x: hidden;
    }

    #settingsBar {
      position: fixed;
      top: 8px;
      right: 8px;
      z-index: 1000;
    }

    #settingsBtn {
      font-size: 16px;
      padding: 8px 12px;
      border: 1px solid #4c5563;
      border-radius: 10px;
      background: #20252d;
      color: #fff;
      cursor: pointer;
    }

    #container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      padding: 48px 8px 8px;
    }

    .video-thumb {
      position: relative;
      background: var(--thumb-bg);
      border: 1px solid var(--thumb-border);
      padding-top: 56.25%;
      cursor: pointer;
      overflow: hidden;
      border-radius: 8px;
    }

    .video-thumb img,
    .video-thumb iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .remove-btn,
    .move-btn {
      position: absolute;
      z-index: 10;
      border: none;
      color: #fff;
      cursor: pointer;
      font-size: var(--ctrl-font);
      line-height: 1;
      padding: var(--ctrl-pad-y) var(--ctrl-pad-x);
      min-width: var(--ctrl-btn-size);
      min-height: var(--ctrl-btn-size);
      border-radius: 6px;
      opacity: 0.92;
    }

    .remove-btn {
      top: 4px;
      right: 4px;
      background: rgba(220, 40, 40, 0.92);
    }

    .move-btn {
      left: 4px;
      background: rgba(55, 55, 55, 0.92);
    }

    .move-up { top: 4px; }
    .move-down { top: calc(4px + var(--ctrl-btn-size) + 4px); }

    .volume-slider {
      position: absolute;
      left: var(--volume-left);
      top: 6px;
      width: var(--volume-width);
      z-index: 10;
      accent-color: var(--accent);
    }

    .layout-1 {
      --ctrl-font: 13px;
      --ctrl-pad-y: 3px;
      --ctrl-pad-x: 7px;
      --ctrl-btn-size: 26px;
      --volume-width: 100px;
      --volume-left: 46px;
    }

    .layout-2 {
      --ctrl-font: 11px;
      --ctrl-pad-y: 2px;
      --ctrl-pad-x: 6px;
      --ctrl-btn-size: 22px;
      --volume-width: 78px;
      --volume-left: 38px;
    }

    .layout-3 {
      --ctrl-font: 9px;
      --ctrl-pad-y: 1px;
      --ctrl-pad-x: 4px;
      --ctrl-btn-size: 18px;
      --volume-width: 58px;
      --volume-left: 30px;
    }

    #settingsToggles {
      display: none;
      position: fixed;
      top: 8px;
      right: 10px;
      bottom: 8px;
      z-index: 1001;
      width: min(92vw, 360px);
      padding-bottom: max(6px, env(safe-area-inset-bottom));
    }

    .settings-panel {
      position: relative;
      width: 100%;
      height: 100%;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      color: #fff;
      padding: 14px;
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      box-shadow: 0 8px 24px rgba(0,0,0,0.28);
    }

    .close-btn {
      position: absolute;
      top: 8px;
      right: 10px;
      font-size: 20px;
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
    }

    .settings-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 12px;
      padding-right: 32px;
    }

    .setting-group {
      margin-bottom: 12px;
      padding: 10px;
      border: 1px solid #36404e;
      border-radius: 10px;
      background: rgba(255,255,255,0.02);
    }

    .group-title {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #7fc5ff;
    }

    .setting-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
      min-width: 0;
    }

    .setting-row:last-child { margin-bottom: 0; }

    .setting-row select,
    .setting-row input,
    .setting-row button {
      font-size: 13px;
      min-height: 36px;
      border-radius: 8px;
    }

    .setting-row select,
    .setting-row input {
      min-width: 0;
      border: 1px solid #4b5564;
      background: var(--input);
      color: #fff;
      padding: 8px 10px;
    }

    .setting-row button {
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      padding: 8px 12px;
      cursor: pointer;
      white-space: nowrap;
    }

    .filter-row select {
      flex: 0 1 108px;
      max-width: 108px;
    }

    .filter-row button {
      flex: 0 0 auto;
    }

    #modalVideoList,
    #modalVideoUrl {
      flex: 1 1 auto;
    }

    .layout-row button {
      flex: 1 1 0;
      padding-inline: 0;
    }

    .simple-checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
    }

    .simple-checkbox input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
      flex: 0 0 auto;
    }

    .settings-panel::after {
      content: "";
      display: block;
      height: max(28px, env(safe-area-inset-bottom));
    }

    @media (max-width: 600px) {
      #settingsBtn {
        font-size: 14px;
        padding: 7px 10px;
      }

      #container {
        gap: 6px;
        padding: 44px 6px 6px;
      }

      #settingsToggles {
        left: 4vw;
        right: 4vw;
        width: auto;
        top: 8px;
        bottom: 8px;
      }

      .settings-panel {
        padding: 12px;
        border-radius: 12px;
      }

      .settings-title { font-size: 17px; }
      .group-title { font-size: 13px; }

      .setting-row {
        flex-wrap: wrap;
        gap: 6px;
      }

      .filter-row select {
        flex: 1 1 calc(50% - 3px);
        max-width: none;
      }

      .filter-row button,
      #modalVideoList,
      #modalVideoUrl,
      .setting-row button {
        flex: 1 1 100%;
      }

      .layout-row button {
        flex: 1 1 calc(33.33% - 4px);
      }

      .layout-3 {
        --ctrl-font: 8px;
        --ctrl-pad-y: 1px;
        --ctrl-pad-x: 3px;
        --ctrl-btn-size: 16px;
        --volume-width: 48px;
        --volume-left: 26px;
      }
    }
  </style>
</head>
<body>
  <div id="settingsBar">
    <button id="settingsBtn" type="button">⚙️ 設定</button>
  </div>

  <div id="settingsToggles">
    <div class="settings-panel" id="settingsPanel">
      <button id="closeSettings" class="close-btn" type="button">×</button>
      <div class="settings-title">設定</div>

      <div class="setting-group">
        <div class="group-title">動画フィルタ</div>
        <div class="setting-row filter-row">
          <select id="modalMainCategory" onchange="filterVideosInModal()">
            <option value="">大分類</option>
          </select>
          <select id="modalSubCategory" onchange="filterVideosInModal()">
            <option value="">小分類</option>
          </select>
          <button type="button" onclick="clearFiltersInModal()">全解除</button>
        </div>
      </div>

      <div class="setting-group">
        <div class="group-title">動画追加</div>
        <div class="setting-row">
          <select id="modalVideoList"></select>
          <button type="button" onclick="addSelectedVideosFromModal()">追加</button>
        </div>
        <div class="setting-row">
          <input id="modalVideoUrl" placeholder="YouTubeのURL">
          <button type="button" onclick="addVideoByUrlFromModal()">URL追加</button>
        </div>
      </div>

      <div class="setting-group">
        <div class="group-title">レイアウト</div>
        <div class="setting-row layout-row">
          <button type="button" onclick="applyLayoutFromModal(1)">1×1</button>
          <button type="button" onclick="applyLayoutFromModal(2)">2×2</button>
          <button type="button" onclick="applyLayoutFromModal(3)">3×3</button>
        </div>
      </div>

      <div class="setting-group">
        <div class="group-title">表示設定</div>
        <div class="setting-row">
          <label class="simple-checkbox">
            <input type="checkbox" id="toggleUpDown" checked>
            上下ボタン表示
          </label>
        </div>
        <div class="setting-row">
          <label class="simple-checkbox">
            <input type="checkbox" id="toggleVolume" checked>
            音量スライダー表示
          </label>
        </div>
        <div class="setting-row">
          <label class="simple-checkbox">
            <input type="checkbox" id="toggleRemove" checked>
            削除ボタン表示
          </label>
        </div>
      </div>
    </div>
  </div>

  <div id="container" class="layout-2"></div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTwHDe9XYtJGqxS_aEGJB7lDK-StQ4UKrrnxKALrPPmVL0aNrEyWwv1wilX-ohr1LQDYn5rvPb0EQll/pub?gid=1636424413&single=true&output=csv";
    const container = document.getElementById("container");
    const settingsBtn = document.getElementById("settingsBtn");
    const settingsToggles = document.getElementById("settingsToggles");
    const settingsPanel = document.getElementById("settingsPanel");
    const closeSettingsBtn = document.getElementById("closeSettings");
    let videoData = [];

    function extractVideoID(url) {
      if (!url) return null;
      const patterns = [
        /[?&]v=([A-Za-z0-9_-]{11})/,
        /youtu\.be\/([A-Za-z0-9_-]{11})/,
        /embed\/([A-Za-z0-9_-]{11})/,
        /shorts\/([A-Za-z0-9_-]{11})/,
        /live\/([A-Za-z0-9_-]{11})/,
        /\/([A-Za-z0-9_-]{11})(?:[?&]|$)/
      ];
      for (const pattern of patterns) {
        const match = url.match(pattern);
        if (match) return match[1];
      }
      return /^[A-Za-z0-9_-]{11}$/.test(url) ? url : null;
    }

    async function loadSpreadsheet() {
      try {
        const res = await fetch(sheetUrl, { cache: "no-store" });
        if (!res.ok) return;
        const text = await res.text();
        const lines = text.trim().split("\n").slice(1);
        videoData = lines.map(line => {
          const [title, main, sub, url] = line.split(",").map(v => v.replace(/"/g, "").trim());
          return { title, main, sub, url };
        }).filter(v => v.url);
        populateModalFilters();
        filterVideosInModal();
      } catch (_) {}
    }

    function createBaseButtons(box) {
      const close = document.createElement("button");
      close.className = "remove-btn";
      close.type = "button";
      close.textContent = "×";
      close.onclick = e => {
        e.stopPropagation();
        box.remove();
        saveState();
      };

      const up = document.createElement("button");
      up.className = "move-btn move-up";
      up.type = "button";
      up.textContent = "↑";
      up.onclick = e => {
        e.stopPropagation();
        moveBox(box, -1);
      };

      const down = document.createElement("button");
      down.className = "move-btn move-down";
      down.type = "button";
      down.textContent = "↓";
      down.onclick = e => {
        e.stopPropagation();
        moveBox(box, 1);
      };

      return { close, up, down };
    }

    function createThumbnail(id) {
      const box = document.createElement("div");
      box.className = "video-thumb";
      box.dataset.videoId = id;

      const img = document.createElement("img");
      img.src = `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
      img.loading = "lazy";
      img.decoding = "async";

      const { close, up, down } = createBaseButtons(box);
      box.append(img, close, up, down);

      box.onclick = () => {
        if (box.querySelector("iframe")) return;

        const iframe = document.createElement("iframe");
        iframe.src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0&enablejsapi=1`;
        iframe.allow = "accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture";
        iframe.allowFullscreen = true;

        const volumeSlider = document.createElement("input");
        volumeSlider.type = "range";
        volumeSlider.min = 0;
        volumeSlider.max = 100;
        volumeSlider.value = getSavedVolume(id);
        volumeSlider.className = "volume-slider";

        box.innerHTML = "";
        box.append(close, up, down, iframe, volumeSlider);

        new YT.Player(iframe, {
          events: {
            onReady: event => {
              event.target.setPlaybackRate(1);
              event.target.setVolume(volumeSlider.value);
              volumeSlider.oninput = () => {
                event.target.setVolume(volumeSlider.value);
                saveVolume(id, volumeSlider.value);
              };
            }
          }
        });

        saveState();
        updateThumbControlsVisibility();
      };

      container.appendChild(box);
      updateThumbControlsVisibility();
    }

    function moveBox(box, dir) {
      const arr = Array.from(container.children);
      const i = arr.indexOf(box);
      const j = i + dir;
      if (j < 0 || j >= arr.length) return;
      if (dir > 0) container.insertBefore(arr[j], box);
      else container.insertBefore(box, arr[j]);
      saveState();
    }

    function setLayoutClass(cols) {
      container.classList.remove("layout-1", "layout-2", "layout-3");
      container.classList.add(`layout-${cols}`);
    }

    function applyLayout(cols) {
      container.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      setLayoutClass(cols);
      localStorage.setItem("gridCols", cols);
    }

    function saveState() {
      const ids = Array.from(document.querySelectorAll(".video-thumb")).map(b => b.dataset.videoId);
      localStorage.setItem("videoThumbs", JSON.stringify(ids));
    }

    function loadState() {
      JSON.parse(localStorage.getItem("videoThumbs") || "[]").forEach(createThumbnail);
    }

    function saveVolume(videoId, volume) {
      const volumes = JSON.parse(localStorage.getItem("videoVolumes") || "{}");
      volumes[videoId] = volume;
      localStorage.setItem("videoVolumes", JSON.stringify(volumes));
    }

    function getSavedVolume(videoId) {
      const volumes = JSON.parse(localStorage.getItem("videoVolumes") || "{}");
      return volumes[videoId] !== undefined ? volumes[videoId] : 100;
    }

    function closeSettings() {
      settingsToggles.style.display = "none";
    }

    function toggleSettings(e) {
      e.stopPropagation();
      settingsToggles.style.display = settingsToggles.style.display === "block" ? "none" : "block";
    }

    function updateThumbControlsVisibility() {
      const showUpDown = document.getElementById("toggleUpDown").checked;
      const showVolume = document.getElementById("toggleVolume").checked;
      const showRemove = document.getElementById("toggleRemove").checked;
      document.querySelectorAll(".move-btn").forEach(btn => btn.style.display = showUpDown ? "" : "none");
      document.querySelectorAll(".volume-slider").forEach(slider => slider.style.display = showVolume ? "" : "none");
      document.querySelectorAll(".remove-btn").forEach(btn => btn.style.display = showRemove ? "" : "none");
      localStorage.setItem("showUpDown", showUpDown ? "1" : "0");
      localStorage.setItem("showVolume", showVolume ? "1" : "0");
      localStorage.setItem("showRemove", showRemove ? "1" : "0");
    }

    function filterVideosInModal() {
      const main = document.getElementById("modalMainCategory").value;
      const sub = document.getElementById("modalSubCategory").value;
      const list = document.getElementById("modalVideoList");
      list.innerHTML = "";
      videoData
        .filter(v => (!main || v.main === main) && (!sub || v.sub === sub))
        .forEach(v => {
          const o = document.createElement("option");
          o.value = v.url;
          o.textContent = v.title;
          list.appendChild(o);
        });
    }

    function clearFiltersInModal() {
      document.getElementById("modalMainCategory").value = "";
      document.getElementById("modalSubCategory").value = "";
      filterVideosInModal();
    }

    function addSelectedVideosFromModal() {
      const url = document.getElementById("modalVideoList").value;
      addVideoByUrlFromModal(url);
    }

    function addVideoByUrlFromModal(inputUrl = null) {
      const url = inputUrl || document.getElementById("modalVideoUrl").value.trim();
      const id = extractVideoID(url);
      if (!id) {
        alert("有効なYouTubeリンクを入力してください");
        return;
      }
      createThumbnail(id);
      document.getElementById("modalVideoUrl").value = "";
      saveState();
    }

    function applyLayoutFromModal(cols) {
      applyLayout(cols);
    }

    function populateModalFilters() {
      const mainSel = document.getElementById("modalMainCategory");
      const subSel = document.getElementById("modalSubCategory");
      const mains = [...new Set(videoData.map(v => v.main).filter(Boolean))].sort();
      const subs = [...new Set(videoData.map(v => v.sub).filter(Boolean))].sort();
      mainSel.innerHTML = '<option value="">大分類</option>';
      subSel.innerHTML = '<option value="">小分類</option>';
      mains.forEach(v => mainSel.innerHTML += `<option>${v}</option>`);
      subs.forEach(v => subSel.innerHTML += `<option>${v}</option>`);
    }

    document.addEventListener("DOMContentLoaded", () => {
      settingsBtn.addEventListener("click", toggleSettings);
      closeSettingsBtn.addEventListener("click", closeSettings);
      settingsPanel.addEventListener("click", e => e.stopPropagation());

      document.addEventListener("pointerdown", e => {
        if (settingsToggles.style.display !== "block") return;
        if (settingsPanel.contains(e.target) || settingsBtn.contains(e.target)) return;
        closeSettings();
      }, { capture: true });

      document.addEventListener("keydown", e => {
        if (e.key === "Escape") closeSettings();
      });

      ["toggleUpDown", "toggleVolume", "toggleRemove"].forEach(id => {
        document.getElementById(id).addEventListener("change", updateThumbControlsVisibility);
      });

      if (localStorage.getItem("showUpDown") === "0") document.getElementById("toggleUpDown").checked = false;
      if (localStorage.getItem("showVolume") === "0") document.getElementById("toggleVolume").checked = false;
      if (localStorage.getItem("showRemove") === "0") document.getElementById("toggleRemove").checked = false;

      loadSpreadsheet();
      loadState();
      const savedCols = Number(localStorage.getItem("gridCols") || 2);
      applyLayout(savedCols);
      updateThumbControlsVisibility();
    });
  </script>
</body>
</html>
